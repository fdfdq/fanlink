<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug 反馈 - fk.txt</title>
    <style>
        :root {
            --bg: #1a1a24;
            --surface: #22222f;
            --surface2: #2a2a3a;
            --text: #e0e0e8;
            --text-secondary: #9090a8;
            --accent: #f0a060;
            --accent-hover: #e08940;
            --accent-glow: rgba(240, 160, 96, 0.25);
            --danger: #f06b6b;
            --success: #5cce7b;
            --border: #353550;
            --border-focus: #f0a060;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Consolas', 'Microsoft YaHei', monospace;
            --font-sans: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 25% 25%, rgba(240, 160, 96, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 75%, rgba(240, 140, 80, 0.04) 0%, transparent 55%);
        }

        .app-container {
            width: 100%;
            max-width: 700px;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--border);
            display: flex;
            flex-direction: column;
            max-height: 92vh;
            overflow: hidden;
        }

        /* 头部 */
        .app-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            background: var(--surface2);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .app-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #f0a060, #e07040);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            color: #fff;
            box-shadow: 0 4px 14px var(--accent-glow);
        }
        .app-title {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #fff;
            white-space: nowrap;
        }
        .app-subtitle {
            font-size: 0.73rem;
            color: var(--text-secondary);
            font-weight: 400;
            white-space: nowrap;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        /* 远程文件指示 */
        .remote-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            white-space: nowrap;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: default;
        }
        .remote-url {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            opacity: 0.7;
        }

        /* 连接状态 */
        .conn-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 16px;
            white-space: nowrap;
            font-weight: 500;
            cursor: pointer;
        }
        .conn-badge.connected {
            background: rgba(92, 206, 123, 0.1);
            color: #5cce7b;
            border: 1px solid rgba(92, 206, 123, 0.25);
        }
        .conn-badge.disconnected {
            background: rgba(240, 107, 107, 0.1);
            color: #f06b6b;
            border: 1px solid rgba(240, 107, 107, 0.25);
        }
        .conn-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .conn-badge.connected .conn-dot {
            background: #5cce7b;
            box-shadow: 0 0 8px rgba(92, 206, 123, 0.6);
            animation: pulse-dot 2.5s infinite;
        }
        .conn-badge.disconnected .conn-dot {
            background: #f06b6b;
            box-shadow: 0 0 8px rgba(240, 107, 107, 0.6);
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(92, 206, 123, 0.5);
            }
            50% {
                box-shadow: 0 0 16px rgba(92, 206, 123, 0.9);
            }
        }
        .conn-badge.saved-flash {
            background: rgba(92, 206, 123, 0.25) !important;
            color: #5cce7b !important;
            border-color: rgba(92, 206, 123, 0.5) !important;
            transition: all 0.2s;
        }

        /* 按钮 */
        .btn {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.83rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            font-family: var(--font-sans);
            letter-spacing: 0.01em;
            outline: none;
        }
        .btn-primary {
            background: var(--accent);
            color: #1a1a24;
            box-shadow: 0 4px 14px var(--accent-glow);
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 20px rgba(240, 160, 96, 0.45);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px var(--accent-glow);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
            box-shadow: none;
        }
        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn-outline:hover {
            background: var(--surface2);
            border-color: #666;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 0.73rem;
            border-radius: 14px;
        }

        /* 提示条 */
        .connect-banner {
            background: rgba(240, 160, 96, 0.08);
            border: 1px solid rgba(240, 160, 96, 0.2);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #d0a070;
        }

        /* 主体 */
        .app-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 20px;
            gap: 6px;
            min-height: 0;
        }
        .editor-label-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.76rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .char-count {
            font-weight: 400;
            opacity: 0.7;
            font-size: 0.7rem;
        }
        .textarea-wrapper {
            flex: 1;
            position: relative;
            min-height: 220px;
            background: var(--bg);
            border-radius: var(--radius);
            border: 1.5px solid var(--border);
            transition: border-color var(--transition), box-shadow var(--transition);
            overflow: hidden;
        }
        .textarea-wrapper:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(240, 160, 96, 0.06);
        }
        .textarea-wrapper.shake {
            animation: shake 0.4s ease-out;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-5px);
            }
            40% {
                transform: translateX(5px);
            }
            60% {
                transform: translateX(-3px);
            }
            80% {
                transform: translateX(3px);
            }
        }
        #editor {
            width: 100%;
            height: 100%;
            background: transparent;
            color: #e8e8f0;
            border: none;
            padding: 14px;
            font-family: var(--font-mono);
            font-size: 0.88rem;
            line-height: 1.7;
            resize: none;
            outline: none;
            tab-size: 4;
            -moz-tab-size: 4;
        }
        #editor::placeholder {
            color: #4a4a60;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* 底部 */
        .app-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            background: var(--surface2);
            font-size: 0.73rem;
            color: var(--text-secondary);
        }
        .footer-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .kbd {
            background: var(--bg);
            padding: 2px 7px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.68rem;
            border: 1px solid var(--border);
            color: #999;
        }
        .last-saved {
            color: #888;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-140px);
            background: #2a2a38;
            color: #fff;
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 0.83rem;
            font-weight: 500;
            z-index: 1000;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: #2d4a35;
            border-color: rgba(92, 206, 123, 0.35);
        }
        .toast.error {
            background: #4a2d2d;
            border-color: rgba(240, 107, 107, 0.35);
        }

        /* 响应式 */
        @media (max-width: 520px) {
            .app-container {
                border-radius: 12px;
                max-height: 95vh;
            }
            .app-header {
                padding: 12px 14px;
                gap: 8px;
            }
            .app-icon {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
            .app-title {
                font-size: 1rem;
            }
            .app-body {
                padding: 10px 12px;
            }
            #editor {
                padding: 10px;
                font-size: 0.8rem;
            }
            .textarea-wrapper {
                min-height: 160px;
            }
            .btn {
                padding: 6px 13px;
                font-size: 0.76rem;
            }
            .remote-badge {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 主应用 -->
    <div class="app-container">
        <!-- 头部 -->
        <header class="app-header">
            <div class="header-left">
                <div class="app-icon">🐛</div>
                <div>
                    <div class="app-title">Bug 反馈</div>
                    <div class="app-subtitle">本地写入 fk.txt</div>
                </div>
            </div>
            <div class="header-right">
                <span class="remote-badge" title="远程只读地址（无法直接写入）">
                    📎 <span class="remote-url">fk.txt 在线地址</span>
                </span>
                <span class="conn-badge disconnected" id="conn-badge" title="点击连接本地 fk.txt">
                    <span class="conn-dot" id="conn-dot"></span>
                    <span id="conn-text">未连接</span>
                </span>
            </div>
        </header>

        <!-- 主体 -->
        <div class="app-body">
            <!-- 未连接提示 -->
            <div class="connect-banner" id="connect-banner">
                <span>⚠️ 尚未连接到本地 fk.txt，请点击右侧按钮授权</span>
                <button class="btn btn-primary btn-sm" id="btn-connect-now">
                    📂 连接本地 fk.txt
                </button>
            </div>

            <div class="editor-label-row">
                <span>📝 反馈内容</span>
                <span class="char-count" id="char-count">0 字符</span>
            </div>
            <div class="textarea-wrapper" id="textarea-wrapper">
                <textarea
                id="editor"
                placeholder="请在此描述您遇到的 Bug…&#10;&#10;示例：&#10;  登录页面在 Safari 浏览器中点击「登录」按钮无响应&#10;  控制台无报错，网络请求状态码 200&#10;  复现步骤：1.打开页面 2.输入账号密码 3.点击登录"
            ></textarea>
        </div>
    </div>

    <!-- 底部 -->
    <footer class="app-footer">
        <div class="footer-left">
            <span>💾 提交</span>
            <span class="kbd">Ctrl+S</span>
            <span>或</span>
            <span class="kbd">⌘S</span>
        </div>
        <span class="last-saved" id="last-saved">尚未保存</span>
        <button class="btn btn-primary" id="btn-save" disabled>
            💾 提交反馈
        </button>
    </footer>
</div>

<script>
    (function() {
        // ============ 硬编码远程 fk.txt 地址（仅供查看，无法直接写入） ============
        const FK_TXT_REMOTE_URL = 'https://fdfdq.github.io/fanlink/fk/fk.txt';

        // ============ DOM 元素 ============
        const editor = document.getElementById('editor');
        const charCount = document.getElementById('char-count');
        const btnSave = document.getElementById('btn-save');
        const btnConnectNow = document.getElementById('btn-connect-now');
        const connBadge = document.getElementById('conn-badge');
        const connDot = document.getElementById('conn-dot');
        const connText = document.getElementById('conn-text');
        const lastSavedEl = document.getElementById('last-saved');
        const textareaWrapper = document.getElementById('textarea-wrapper');
        const connectBanner = document.getElementById('connect-banner');
        const toast = document.getElementById('toast');
        const remoteBadge = document.querySelector('.remote-badge');
        const remoteUrlSpan = document.querySelector('.remote-url');

        // 显示远程 URL 片段
        if (remoteUrlSpan) {
            remoteUrlSpan.textContent = FK_TXT_REMOTE_URL.length > 45 ?
                FK_TXT_REMOTE_URL.substring(0, 42) + '…' :
                FK_TXT_REMOTE_URL;
            remoteBadge.title = `远程只读地址：${FK_TXT_REMOTE_URL}\n（浏览器安全限制，无法直接写入远程文件，需通过本地文件操作）`;
        }

        // ============ 状态 ============
        let fileHandle = null; // FileSystemFileHandle
        let isSaving = false;
        let toastTimer = null;

        // ============ IndexedDB 文件句柄持久化 ============
        const DB_NAME = 'bugfeedback-fk-v2';
        const DB_VERSION = 1;
        const STORE_NAME = 'file-handles';
        const HANDLE_KEY = 'fk-txt-handle';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function storeFileHandle(handle) {
            try {
                const db = await openDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put(handle, HANDLE_KEY);
                await new Promise((resolve, reject) => {
                    tx.oncomplete = resolve;
                    tx.onerror = reject;
                });
                db.close();
                console.log('✅ 文件句柄已存储');
            } catch (err) {
                console.warn('存储文件句柄失败:', err);
            }
        }

        async function loadFileHandle() {
            try {
                const db = await openDB();
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const handle = await new Promise((resolve, reject) => {
                    const request = store.get(HANDLE_KEY);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
                db.close();
                if (handle && handle.queryPermission) {
                    return handle;
                }
                return null;
            } catch (err) {
                console.warn('加载文件句柄失败:', err);
                return null;
            }
        }

        async function clearStoredHandle() {
            try {
                const db = await openDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.delete(HANDLE_KEY);
                await new Promise((resolve, reject) => {
                    tx.oncomplete = resolve;
                    tx.onerror = reject;
                });
                db.close();
            } catch (err) { /* 忽略 */ }
        }

        // ============ Toast 通知 ============
        function showToast(message, type = '') {
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
                toast.className = 'toast';
            }, 2600);
        }

        // ============ UI 状态更新 ============
        function updateConnectionUI(state) {
            if (state === 'connected') {
                connBadge.className = 'conn-badge connected';
                connDot.className = 'conn-dot';
                connText.textContent = '已连接 fk.txt';
                btnSave.disabled = false;
                btnSave.textContent = '💾 提交反馈';
                connectBanner.style.display = 'none';
            } else {
                connBadge.className = 'conn-badge disconnected';
                connDot.className = 'conn-dot';
                connText.textContent = '未连接';
                btnSave.disabled = true;
                btnSave.textContent = '💾 请先连接文件';
                connectBanner.style.display = 'flex';
            }
        }

        function flashSavedBadge() {
            connBadge.classList.add('saved-flash');
            connText.textContent = '已保存 ✓';
            setTimeout(() => {
                connBadge.classList.remove('saved-flash');
                connText.textContent = '已连接 fk.txt';
            }, 1600);
        }

        function updateLastSavedTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            lastSavedEl.textContent = `上次保存：${timeStr}`;
        }

        function updateCharCount() {
            const len = editor.value.length;
            charCount.textContent = `${len} 字符`;
        }

        // ============ 编辑器事件 ============
        editor.addEventListener('input', updateCharCount);
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '\t' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 1;
                updateCharCount();
            }
        });

        // ============ 文件操作 (File System Access API) ============
        async function verifyPermission(handle) {
            const options = { mode: 'readwrite' };
            if ((await handle.queryPermission(options)) === 'granted') return true;
            if ((await handle.requestPermission(options)) === 'granted') return true;
            return false;
        }

        async function readFileContent(handle) {
            const file = await handle.getFile();
            return await file.text();
        }

        async function writeFileContent(handle, content) {
            const writable = await handle.createWritable();
            await writable.write(content);
            await writable.close();
        }

        /**
         * 打开本地文件选择器，要求用户选择 fk.txt
         */
        async function selectLocalFkFile() {
            if (!('showOpenFilePicker' in window)) {
                showToast('浏览器不支持文件API，请使用 Chrome 或 Edge', 'error');
                return null;
            }
            try {
                const [handle] = await window.showOpenFilePicker({
                    types: [{
                        description: '文本文件',
                        accept: { 'text/plain': ['.txt'] },
                    }],
                    multiple: false,
                    startIn: 'documents',
                });
                const file = await handle.getFile();
                // 建议用户选择 fk.txt，但不强制（允许其他命名）
                if (!file.name.toLowerCase().includes('fk.txt')) {
                    console.warn('用户选择的文件并非 fk.txt:', file.name);
                    showToast('建议选择 fk.txt，当前文件：' + file.name, 'error');
                    // 仍然允许继续，但给出提示
                }
                return handle;
            } catch (err) {
                if (err.name === 'AbortError') return null;
                console.error('选择文件出错:', err);
                showToast('选择文件失败: ' + err.message, 'error');
                return null;
            }
        }

        /**
         * 建立本地文件连接
         */
        async function establishConnection(handle) {
            if (!handle) return false;
            const hasPermission = await verifyPermission(handle);
            if (!hasPermission) {
                showToast('文件权限被拒绝，请重新授权', 'error');
                return false;
            }
            fileHandle = handle;
            await storeFileHandle(handle);
            updateConnectionUI('connected');
            updateLastSavedTime();
            editor.focus();
            // 将光标移到末尾（如果编辑器有内容）
            editor.selectionStart = editor.selectionEnd = editor.value.length;
            return true;
        }

        /**
         * 保存反馈：将编辑器内容追加到本地 fk.txt 末尾（带时间戳，自动换行）
         * 保存后清空编辑器，以便输入下一条反馈
         */
        async function saveFeedback() {
            if (!fileHandle) {
                showToast('请先连接本地 fk.txt 文件', 'error');
                return;
            }
            if (isSaving) return;

            const feedbackText = editor.value.trim();
            if (!feedbackText) {
                showToast('请输入反馈内容', 'error');
                textareaWrapper.classList.add('shake');
                setTimeout(() => textareaWrapper.classList.remove('shake'), 400);
                editor.focus();
                return;
            }

            isSaving = true;
            btnSave.disabled = true;
            btnSave.textContent = '⏳ 保存中…';

            try {
                const hasPermission = await verifyPermission(fileHandle);
                if (!hasPermission) {
                    showToast('文件权限失效，请重新连接 fk.txt', 'error');
                    fileHandle = null;
                    await clearStoredHandle();
                    updateConnectionUI('disconnected');
                    return;
                }

                // 生成带时间戳的反馈记录
                const now = new Date();
                const timestamp = now.toISOString().replace('T', ' ').slice(0, 19);
                const formattedFeedback = `[${timestamp}] ${feedbackText}`;

                // 读取当前文件内容
                let currentContent = '';
                try {
                    currentContent = await readFileContent(fileHandle);
                } catch (e) {
                    currentContent = '';
                }

                // 构建追加内容：确保末尾换行后添加新记录
                let newContent;
                if (currentContent.length === 0) {
                    newContent = formattedFeedback + '\n';
                } else {
                    const needsNewline = !currentContent.endsWith('\n');
                    const separator = needsNewline ? '\n' : '';
                    newContent = currentContent + separator + formattedFeedback + '\n';
                }

                await writeFileContent(fileHandle, newContent);

                // 清空编辑器
                editor.value = '';
                updateCharCount();
                editor.focus();

                flashSavedBadge();
                updateLastSavedTime();
                showToast('✅ 反馈已追加到本地 fk.txt', 'success');

            } catch (err) {
                console.error('保存失败:', err);
                showToast('保存失败: ' + err.message, 'error');
                textareaWrapper.classList.add('shake');
                setTimeout(() => textareaWrapper.classList.remove('shake'), 400);
            } finally {
                isSaving = false;
                btnSave.disabled = false;
                btnSave.textContent = '💾 提交反馈';
                if (!fileHandle) {
                    btnSave.disabled = true;
                    btnSave.textContent = '💾 请先连接文件';
                }
            }
        }

        // ============ 事件绑定 ============
        btnSave.addEventListener('click', saveFeedback);

        btnConnectNow.addEventListener('click', async () => {
            const handle = await selectLocalFkFile();
            if (handle) await establishConnection(handle);
        });

        connBadge.addEventListener('click', async () => {
            if (fileHandle) return; // 已连接，不做操作
            const handle = await selectLocalFkFile();
            if (handle) await establishConnection(handle);
        });

        // 全局快捷键 Ctrl+S / Cmd+S
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                if (fileHandle && !isSaving) {
                    saveFeedback();
                } else if (!fileHandle) {
                    showToast('请先点击连接按钮，授权访问本地 fk.txt', 'error');
                }
            }
        });

        // 尝试从远程 URL 加载内容（可选：仅用于预览历史，但不会自动填充到编辑器）
        async function loadRemotePreview() {
            try {
                const response = await fetch(FK_TXT_REMOTE_URL, { cache: 'no-store' });
                if (response.ok) {
                    const text = await response.text();
                    console.log('📡 远程 fk.txt 内容已获取（仅供查看，不会自动填入编辑器）');
                    // 我们不在编辑器中显示，以免干扰新反馈
                    // 但可以在控制台输出最后几行供参考
                }
            } catch (err) {
                console.warn('无法获取远程 fk.txt（可能跨域或网络问题）', err);
            }
        }

        // ============ 初始化 ============
        async function init() {
            console.log('🐛 Bug 反馈记事本启动');
            console.log(`📋 远程地址（只读）：${FK_TXT_REMOTE_URL}`);
            console.log('💡 提示：点击状态徽章或“连接本地 fk.txt”按钮，选择本地 fk.txt 文件即可开始反馈');
            updateCharCount();

            // 检查浏览器支持
            if (!('showOpenFilePicker' in window)) {
                console.warn('⚠️ 浏览器不支持 File System Access API');
                updateConnectionUI('disconnected');
                connText.textContent = '浏览器不兼容';
                connectBanner.innerHTML =
                    '<span>⚠️ 当前浏览器不支持文件系统API，请使用 <strong>Chrome</strong> 或 <strong>Edge</strong> 打开此页面</span>';
                btnConnectNow.style.display = 'none';
                return;
            }

            // 尝试从 IndexedDB 恢复本地文件句柄
            const storedHandle = await loadFileHandle();
            if (storedHandle) {
                const hasPermission = await verifyPermission(storedHandle);
                if (hasPermission) {
                    console.log('✅ 已自动恢复本地文件连接');
                    fileHandle = storedHandle;
                    updateConnectionUI('connected');
                    updateLastSavedTime();
                    editor.focus();
                } else {
                    console.log('⚠️ 存储的句柄权限已过期，需要重新连接');
                    await clearStoredHandle();
                    updateConnectionUI('disconnected');
                }
            } else {
                updateConnectionUI('disconnected');
            }

            // 静默尝试获取远程内容（不影响使用）
            loadRemotePreview();

            // 编辑器自动聚焦
            editor.focus();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // 离开页面提醒
        window.addEventListener('beforeunload', (e) => {
            if (fileHandle && editor.value.trim() && !isSaving) {
                const message = '您有未保存的反馈内容，确定要离开吗？';
                e.preventDefault();
                e.returnValue = message;
                return message;
            }
        });

        // 定期检查文件权限
        setInterval(async () => {
            if (fileHandle) {
                const hasPermission = await verifyPermission(fileHandle);
                if (!hasPermission) {
                    console.warn('⚠️ 文件权限已失效');
                    fileHandle = null;
                    await clearStoredHandle();
                    updateConnectionUI('disconnected');
                    showToast('文件权限失效，请重新连接本地 fk.txt', 'error');
                }
            }
        }, 30000);

        console.log('✅ 就绪 — 连接本地 fk.txt 后即可提交反馈');
    })();
